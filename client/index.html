<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Railytics Catalyst</title>
<link rel="icon" type="image/jpeg" href="./favicon.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#000 0%,#1a1a00 100%);color:#fff;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
::-webkit-scrollbar-thumb{background:#FFC107;border-radius:3px}
a{color:#FFC107;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

/* ═══════════════ HEADER ═══════════════ */
.header{position:fixed;top:0;left:0;right:0;z-index:1200;background:#FFAD01;display:flex;align-items:center;padding:8px 20px;min-height:80px}
.header .hamburger{background:none;color:#000;font-size:2rem;padding:12px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.2s}
.header .hamburger:hover{background:rgba(0,0,0,.1);transform:scale(1.05)}
.header .logo{height:64px;margin-left:12px}
.header-spacer{height:80px}

/* ═══════════════ DRAWER ═══════════════ */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1300;opacity:0;pointer-events:none;transition:.3s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:#1a1a1a;border-right:1px solid rgba(255,193,7,.3);z-index:1400;transform:translateX(-100%);transition:.3s}
.drawer.open{transform:translateX(0)}
.drawer .flag{width:100%;display:block;border-bottom:1px solid rgba(255,193,7,.3)}
.drawer .menu-item{display:flex;align-items:center;gap:12px;padding:14px 20px;color:#fff;font-size:.95rem;font-weight:400;transition:.2s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.drawer .menu-item:hover{background:rgba(255,193,7,.1)}
.drawer .menu-item.active{background:rgba(255,193,7,.2);color:#FFC107;font-weight:600}
.drawer .menu-item .material-icons{color:#FFC107;font-size:1.4rem}

/* ═══════════════ CONTAINER ═══════════════ */
.container{max-width:1600px;margin:0 auto;padding:16px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ═══════════════ CARDS ═══════════════ */
.card{background:#1e1e1e;border:1px solid rgba(255,193,7,.15);border-radius:12px;overflow:hidden;transition:.3s}
.card:hover{border-color:rgba(255,193,7,.4);box-shadow:0 4px 20px rgba(255,176,0,.1)}
.card-content{padding:16px}

/* ═══════════════ STREAM GRID ═══════════════ */
.stream-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px}
.stream-card .yt-embed{position:relative;width:100%;padding-bottom:56.25%;background:#000}
.stream-card .yt-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.stream-card .live-badge{position:absolute;top:8px;left:8px;background:#f44336;color:#fff;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700;z-index:1}
.stream-card h3{font-size:1rem;font-weight:600;margin-bottom:6px}
.stream-card .meta{font-size:.8rem;color:#aaa;margin-bottom:8px}

/* ═══════════════ CHIPS ═══════════════ */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:16px;font-size:.75rem;font-weight:500}
.chip.success{background:rgba(76,175,80,.2);color:#4CAF50;border:1px solid rgba(76,175,80,.4)}
.chip.error{background:rgba(244,67,54,.2);color:#f44336;border:1px solid rgba(244,67,54,.4)}
.chip.warning{background:rgba(255,152,0,.2);color:#ff9800;border:1px solid rgba(255,152,0,.4)}
.chip.live{background:#f44336;color:#fff}
.chip.primary{background:rgba(255,193,7,.2);color:#FFC107;border:1px solid rgba(255,193,7,.4)}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:6px;font-size:.85rem;font-weight:500;transition:.2s}
.btn-primary{background:#FFC107;color:#000}
.btn-primary:hover{background:#FFD54F}
.btn-primary:disabled{background:#666;color:#999;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid #FFC107;color:#FFC107}
.btn-outline:hover{background:rgba(255,193,7,.1)}
.btn-error{background:transparent;border:1px solid #f44336;color:#f44336}
.btn-error:hover{background:rgba(244,67,54,.1)}
.btn-sm{padding:4px 10px;font-size:.8rem}

/* ═══════════════ ALERT ═══════════════ */
.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem}
.alert.info{background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.3);color:#90CAF9}

/* ═══════════════ TABLE ═══════════════ */
table{width:100%;border-collapse:collapse}
table th{background:#FFAD01;color:#000;font-weight:700;padding:10px 14px;text-align:left;font-size:.85rem}
table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
table tr:hover{background:rgba(255,193,7,.05)}

/* ═══════════════ TABS (inner) ═══════════════ */
.tabs-bar{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:20px}
.tab-btn{padding:10px 20px;font-size:.9rem;color:#aaa;background:none;border:none;border-bottom:2px solid transparent;transition:.2s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:#FFC107;border-bottom-color:#FFC107}
.inner-tab{display:none}
.inner-tab.active{display:block}

/* ═══════════════ STAT CARDS ═══════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:linear-gradient(135deg,#2a2a2a,#1a1a1a);border:2px solid #FFB000;border-radius:16px;padding:20px;position:relative;overflow:hidden}
.stat-card .label{color:#ccc;font-size:.8rem;margin-bottom:8px}
.stat-card .value{font-size:2rem;font-weight:700;color:#fff}
.stat-card .sub{font-size:.8rem;color:#22c55e;margin-top:4px}

/* ═══════════════ CHARTS ═══════════════ */
.chart-container{background:#000;border-radius:8px;padding:16px;margin-bottom:24px;position:relative}

/* ═══════════════ CALENDAR ═══════════════ */
.calendar{background:#1a1a1a;border:1px solid rgba(255,173,1,.2);border-radius:12px;padding:20px;max-width:420px}
.calendar .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.calendar .cal-header h3{font-size:1.2rem;font-weight:700}
.calendar .cal-nav{background:rgba(255,193,7,.1);color:#FFC107;border:none;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:.2s}
.calendar .cal-nav:hover{background:rgba(255,193,7,.2)}
.calendar .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px}
.calendar .weekdays span{color:rgba(255,255,255,.5);font-size:.8rem;padding:8px 0}
.calendar .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calendar .day-btn{background:none;border:none;color:rgba(255,255,255,.7);padding:10px 0;border-radius:8px;font-size:.9rem;transition:.2s}
.calendar .day-btn:hover{background:rgba(255,255,255,.1);color:#FFC107}
.calendar .day-btn.today{background:#FFC107;color:#000;font-weight:700}
.calendar .day-btn.selected{background:#4CAF50;color:#000;font-weight:700}
.calendar .day-btn.has-events{background:rgba(100,181,246,.7);color:#000;font-weight:600;border:1px solid rgba(100,181,246,.5)}
.calendar .day-btn.empty{visibility:hidden}

/* ═══════════════ FRAME GALLERY ═══════════════ */
.frame-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.frame-card img{width:100%;height:200px;object-fit:cover;display:block}
.frame-card .frame-info{padding:12px}

/* ═══════════════ SESSION CARDS ═══════════════ */
.session-card{background:linear-gradient(135deg,#FFB000,#FFC733);color:#1a1a1a;border-radius:16px;padding:20px;border:2px solid #E09900;position:relative;overflow:hidden;transition:.3s}
.session-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,176,0,.3)}
.session-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#22c55e,#16a34a)}
.session-card h4{font-weight:700;margin-bottom:8px}
.session-card .progress-bar{height:8px;background:rgba(26,26,26,.2);border-radius:4px;overflow:hidden;margin-top:8px}
.session-card .progress-bar .fill{height:100%;border-radius:4px;transition:.5s}

/* ═══════════════ MODAL/DIALOG ═══════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1e1e1e;border-radius:12px;width:90vw;max-width:1100px;max-height:90vh;overflow:auto;border:1px solid rgba(255,193,7,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.modal-body{padding:20px}
.modal-body iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:8px}
.modal-close{background:none;color:#fff;font-size:1.5rem;padding:4px;border-radius:50%;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.1)}

/* ═══════════════ PAGINATION ═══════════════ */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}
.pagination button{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);padding:6px 12px;border-radius:6px;font-size:.85rem;transition:.2s}
.pagination button:hover{background:rgba(255,193,7,.15);border-color:#FFC107}
.pagination button.active{background:#FFC107;color:#000;font-weight:600}

/* ═══════════════ LOADING ═══════════════ */
.spinner{width:40px;height:40px;border:4px solid rgba(255,193,7,.2);border-top-color:#FFC107;border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}
.pulse{animation:pulse 2s infinite}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:768px){
 .stream-grid{grid-template-columns:1fr}
 .stat-grid{grid-template-columns:1fr 1fr}
 .frame-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="header">
  <button class="hamburger" onclick="toggleDrawer()"><span class="material-icons">menu</span></button>
  <img src="./up_logo.jpg" alt="UP" class="logo"/>
</header>
<div class="header-spacer"></div>

<!-- ═══════════════ DRAWER ═══════════════ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
  <img src="./usa_flag.jpg" alt="USA" class="flag"/>
  <button class="menu-item active" onclick="switchTab(0)"><span class="material-icons">video_call</span>STREAM SELECTION</button>
  <button class="menu-item" onclick="switchTab(1)"><span class="material-icons">analytics</span>REAL-TIME ANALYSIS</button>
  <button class="menu-item" onclick="switchTab(2)"><span class="material-icons">dashboard</span>DASHBOARD</button>
  <button class="menu-item" onclick="switchTab(3)"><span class="material-icons">photo_library</span>FRAME GALLERY</button>
</nav>

<!-- ═══════════════ CONTENT ═══════════════ -->
<div class="container">

<!-- ════ TAB 0: STREAM SELECTION ════ -->
<div class="tab-panel active" id="tab0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h2 style="font-weight:600"></h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="startAllAnalysis()"><span class="material-icons" style="font-size:1rem">play_arrow</span> Start All</button>
      <button class="btn btn-error btn-sm" onclick="stopAllAnalysis()"><span class="material-icons" style="font-size:1rem">stop</span> Stop All</button>
    </div>
  </div>
  <div id="sessionsAlert"></div>
  <div class="stream-grid" id="streamGrid"><div class="spinner"></div></div>
</div>

<!-- ════ TAB 1: REAL-TIME ANALYSIS ════ -->
<div class="tab-panel" id="tab1">
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchInnerTab(0,this)"><span class="material-icons" style="font-size:1.1rem">table_view</span> Multi-Stream View</button>
    <button class="tab-btn" onclick="switchInnerTab(1,this)"><span class="material-icons" style="font-size:1.1rem">bar_chart</span> Analytics</button>
    <button class="tab-btn" onclick="switchInnerTab(2,this)"><span class="material-icons" style="font-size:1.1rem">show_chart</span> Historical</button>
  </div>
  <!-- Inner Tab 0: Multi-Stream -->
  <div class="inner-tab active" id="innerTab0">
    <div id="multiStreamContent"><div class="spinner"></div></div>
  </div>
  <!-- Inner Tab 1: Analytics -->
  <div class="inner-tab" id="innerTab1">
    <div id="analyticsContent">
      <div class="stat-grid" id="statCards"></div>
      <div class="card" style="margin-bottom:24px"><div class="card-content"><h3 style="margin-bottom:12px">Real-Time Performance Metrics</h3><div class="chart-container"><canvas id="perfChart" height="300"></canvas></div></div></div>
      <div class="card" style="margin-bottom:24px"><div class="card-content"><h3 style="margin-bottom:12px">Detection Rate by Stream</h3><div class="chart-container" style="max-width:500px;margin:0 auto"><canvas id="pieChart" height="350"></canvas></div></div></div>
      <div id="sessionCards"></div>
    </div>
  </div>
  <!-- Inner Tab 2: Historical -->
  <div class="inner-tab" id="innerTab2">
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:24px;align-items:start">
      <div>
        <h3 style="color:#FFC107;margin-bottom:12px">Event Calendar</h3>
        <div class="calendar" id="calendar"></div>
      </div>
      <div>
        <h3 style="color:#FFC107;margin-bottom:12px">Events for <span id="selectedDateLabel"></span></h3>
        <div class="card"><div class="card-content" id="calendarEvents"><p style="color:#aaa;text-align:center;padding:40px">Select a date to view events</p></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ════ TAB 2: DASHBOARD ════ -->
<div class="tab-panel" id="tab2">
  <div class="card" style="border-color:#FFC107">
    <div class="card-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="display:flex;align-items:center;gap:8px"><span class="material-icons" style="color:#FFC107">event</span> Railway Events</h2>
        <button class="btn btn-outline btn-sm" onclick="loadDashboard()"><span class="material-icons" style="font-size:1rem">refresh</span></button>
      </div>
      <div id="dashboardTable"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ════ TAB 3: FRAME GALLERY ════ -->
<div class="tab-panel" id="tab3">
  <div class="card" style="margin-bottom:20px">
    <div class="card-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <h2>Captured Frames</h2>
          <span class="chip primary" id="framesCount"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="frameFilter" onchange="loadFrames()" style="background:#1e1e1e;color:#fff;border:1px solid rgba(255,193,7,.3);padding:6px 12px;border-radius:6px;font-size:.85rem"><option value="">All locations</option></select>
          <button class="btn btn-outline btn-sm" onclick="loadFrames()"><span class="material-icons" style="font-size:1rem">refresh</span></button>
        </div>
      </div>
      <div id="framesStats" style="display:flex;gap:20px;margin-bottom:16px;font-size:.85rem;color:#aaa"></div>
      <div class="frame-grid" id="frameGrid"><div class="spinner"></div></div>
      <div class="pagination" id="framesPagination"></div>
    </div>
  </div>
</div>

</div><!-- /container -->

<!-- ═══════════════ STREAM VIEWER MODAL ═══════════════ -->
<div class="modal-overlay" id="viewerModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="viewerTitle">Stream</h3>
      <div style="display:flex;gap:8px">
        <button class="modal-close" onclick="openStreamExternal()" title="Open in YouTube"><span class="material-icons">open_in_new</span></button>
        <button class="modal-close" onclick="closeViewer()"><span class="material-icons">close</span></button>
      </div>
    </div>
    <div class="modal-body"><iframe id="viewerIframe" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>
  </div>
</div>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->
<script>
/* ─── CONFIG ──────────────────────────────── */
const API = '/server/railytics_realtime_tracker_function';
let currentTab = 0;
let streams = [];
let sessions = [];
let allEvents = [];
let currentViewUrl = '';
let framesPage = 1;
let selectedCalDate = new Date();
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let perfChart = null;
let pieChart = null;
let chartData = [];
let pollingInterval = null;

/* ─── API HELPERS ─────────────────────────── */
async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  return r.json();
}

/* ─── NAVIGATION ──────────────────────────── */
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawerOverlay').classList.toggle('open');
}
function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.drawer .menu-item').forEach((m,i) => m.classList.toggle('active', i===idx));
  toggleDrawer();
  if (idx===0) loadStreams();
  if (idx===1) { loadMultiStream(); startPolling(); }
  if (idx===2) loadDashboard();
  if (idx===3) loadFrames();
  if (idx!==1) stopPolling();
}
function switchInnerTab(idx, btn) {
  document.querySelectorAll('#tab1 .inner-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('#tab1 .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (idx===1) loadAnalytics();
  if (idx===2) { renderCalendar(); loadAllEvents(); }
}

/* ─── YOUTUBE HELPERS ─────────────────────── */
function getVideoId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^#&?]{11})/);
  return m ? m[1] : null;
}
function embedUrl(url) {
  const id = getVideoId(url);
  return id ? 'https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1' : '';
}
function embedUrlFull(url) {
  const id = getVideoId(url);
  return id ? 'https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&mute=0&controls=1&modestbranding=1&rel=0&fs=1' : '';
}

/* ═══════════════ STREAM SELECTION ═══════════════ */
async function loadStreams() {
  try {
    const d = await api('/streams?active_only=true');
    streams = d.streams || [];
    let sessD;
    try { sessD = await api('/analysis/sessions'); } catch(_) { sessD = {active_sessions:[]}; }
    sessions = sessD.active_sessions || [];
    renderStreams();
    renderSessionsAlert();
  } catch(e) { document.getElementById('streamGrid').innerHTML = '<p style="color:#f44336;text-align:center;grid-column:1/-1">Error loading streams: '+e.message+'</p>'; }
}

function renderSessionsAlert() {
  const el = document.getElementById('sessionsAlert');
  if (!sessions.length) { el.innerHTML=''; return; }
  el.innerHTML = '<div class="alert info"><strong>'+sessions.length+' Analysis Session(s) in Progress</strong><br/>'+sessions.map(s=>'<strong>'+s.stream_name+':</strong> '+s.frames_processed+' frames, '+s.trains_detected+' trains ('+(s.detection_rate||0)+'%)').join(' | ')+'</div>';
}

function renderStreams() {
  const g = document.getElementById('streamGrid');
  if (!streams.length) { g.innerHTML='<div class="card" style="grid-column:1/-1"><div class="card-content" style="text-align:center;padding:40px"><h3 style="color:#aaa;margin-bottom:8px">No streams available</h3><p style="color:#777">Contact the administrator to add streams.</p></div></div>'; return; }
  const sessionMap = {};
  sessions.forEach(s => sessionMap[s.stream_id]=s);
  g.innerHTML = streams.map(s => {
    const analyzing = !!sessionMap[s.id];
    const meta = s.youtube_metadata || {};
    return '<div class="card stream-card"><div class="yt-embed">'+(meta.is_live?'<span class="live-badge">LIVE</span>':'')+'<iframe src="'+embedUrl(s.url)+'" loading="lazy" allow="autoplay;encrypted-media" allowfullscreen></iframe></div><div class="card-content"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h3>'+s.name+'</h3><div style="display:flex;gap:4px;flex-wrap:wrap"><span class="chip success">Active</span>'+(meta.is_live?'<span class="chip live">LIVE</span>':'')+(analyzing?'<span class="chip warning">Analyzing</span>':'')+'</div></div>'+(meta.title?'<p style="font-size:.85rem;font-weight:500;margin-bottom:4px">'+meta.title+'</p>':'')+(meta.uploader?'<p class="meta">Channel: '+meta.uploader+(meta.view_count>0?' &bull; '+meta.view_count.toLocaleString()+' views':'')+'</p>':'')+'<p class="meta">'+(s.description||'No description')+'</p><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><button class="btn btn-outline btn-sm" onclick="openViewer(\''+s.url+'\',\''+s.name+'\')"><span class="material-icons" style="font-size:1rem">visibility</span> Watch</button>'+(analyzing?'<button class="btn btn-error btn-sm" onclick="stopStream(\''+s.id+'\')"><span class="material-icons" style="font-size:1rem">stop</span> Stop</button>':'<button class="btn btn-primary btn-sm" onclick="startStream(\''+s.id+'\')"><span class="material-icons" style="font-size:1rem">play_arrow</span> Start Analysis</button>')+'</div></div></div>';
  }).join('');
}

async function startStream(id) {
  await apiPost('/analysis/start',{stream_id:id,duration_minutes:0});
  loadStreams();
}
async function stopStream(id) {
  await apiPost('/analysis/stop?stream_id='+id);
  loadStreams();
}
async function startAllAnalysis() {
  for (const s of streams) { try { await apiPost('/analysis/start',{stream_id:s.id,duration_minutes:0}); } catch(_){} }
  loadStreams();
}
async function stopAllAnalysis() {
  await apiPost('/analysis/stop');
  loadStreams();
}

/* ═══════════════ VIEWER MODAL ═══════════════ */
function openViewer(url, name) {
  currentViewUrl = url;
  document.getElementById('viewerTitle').textContent = name;
  document.getElementById('viewerIframe').src = embedUrlFull(url);
  document.getElementById('viewerModal').classList.add('open');
}
function closeViewer() {
  document.getElementById('viewerIframe').src = '';
  document.getElementById('viewerModal').classList.remove('open');
}
function openStreamExternal() { if(currentViewUrl) window.open(currentViewUrl,'_blank'); }

/* ═══════════════ MULTI-STREAM TABLE ═══════════════ */
async function loadMultiStream() {
  try {
    const d = await api('/analysis/sessions');
    sessions = d.active_sessions || [];
    renderMultiStream();
  } catch(e) { document.getElementById('multiStreamContent').innerHTML='<p style="color:#f44336">Error: '+e.message+'</p>'; }
}

function renderMultiStream() {
  const el = document.getElementById('multiStreamContent');
  if (!sessions.length) { el.innerHTML='<div style="text-align:center;padding:60px"><span class="material-icons" style="font-size:80px;color:#555">analytics</span><h3 style="color:#aaa;margin-top:12px">No Active Analysis</h3><p style="color:#777">Start an analysis from the Stream Selection tab.</p></div>'; return; }
  const fmtDur = s => { const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60; return h>0?h+'h '+m+'m':m>0?m+'m '+sec+'s':sec+'s'; };
  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3>Active Stream Analysis ('+sessions.length+')</h3><button class="btn btn-outline btn-sm" onclick="loadMultiStream()">Refresh</button></div><table><tr><th>Stream</th><th>Status</th><th>Runtime</th><th>Frames</th><th>Trains</th><th>Detection Rate</th><th>Actions</th></tr>'+sessions.map(s=>'<tr><td><strong>'+s.stream_name+'</strong><br/><span style="color:#777;font-size:.75rem">'+s.stream_id.substring(0,12)+'...</span></td><td><span class="chip '+(s.active?'success':'error')+'">'+(s.active?'Running':'Stopped')+'</span></td><td>'+fmtDur(s.runtime_seconds||0)+'</td><td>'+(s.frames_processed||0).toLocaleString()+'</td><td>'+(s.trains_detected||0).toLocaleString()+'</td><td><strong>'+(s.detection_rate||0)+'%</strong><div style="background:rgba(255,255,255,.1);height:6px;border-radius:3px;width:80px;margin-top:4px"><div style="background:'+(s.detection_rate>20?'#4CAF50':s.detection_rate>10?'#ff9800':'#f44336')+';height:100%;border-radius:3px;width:'+Math.min(s.detection_rate||0,100)+'%"></div></div></td><td><button class="btn btn-error btn-sm" onclick="stopStream(\''+s.stream_id+'\');setTimeout(loadMultiStream,500)"><span class="material-icons" style="font-size:1rem">stop</span></button></td></tr>').join('')+'</table>';
}

/* ═══════════════ ANALYTICS ═══════════════ */
async function loadAnalytics() {
  try {
    const d = await api('/analysis/sessions');
    sessions = d.active_sessions || [];
    renderStatCards();
    renderSessionDetailCards();
    updateCharts();
  } catch(e) { console.error(e); }
}

function renderStatCards() {
  const total = sessions.reduce((a,s)=>({p:a.p+(s.frames_processed||0),d:a.d+(s.trains_detected||0)}),{p:0,d:0});
  const rate = total.p>0?((total.d/total.p)*100).toFixed(1):0;
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('statCards').innerHTML =
    '<div class="stat-card"><div class="label">ACTIVE STREAMS</div><div class="value">'+sessions.length+'</div><div class="sub">'+(sessions.length>0?'Currently monitoring':'No monitoring')+'</div></div>'+
    '<div class="stat-card"><div class="label">LATEST CAPTURE</div><div class="value" style="font-size:1.4rem">'+t+'</div><div class="sub">'+(sessions[0]?.stream_name||'—')+'</div></div>'+
    '<div class="stat-card"><div class="label">TOTAL DETECTIONS</div><div class="value">'+total.d.toLocaleString()+'</div><div class="sub">Detection rate: '+rate+'%</div></div>';
}

function renderSessionDetailCards() {
  const el = document.getElementById('sessionCards');
  if (!sessions.length) { el.innerHTML=''; return; }
  el.innerHTML='<div class="card" style="margin-top:24px"><div class="card-content"><h3 style="margin-bottom:16px">Active Analysis Sessions</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">'+sessions.map(s=>'<div class="session-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4>'+s.stream_name+'</h4><span class="chip '+(s.active?'success':'error')+'" style="font-size:.7rem">'+(s.active?'Active':'Stopped')+'</span></div><p style="font-size:.85rem">Frames: <strong>'+(s.frames_processed||0).toLocaleString()+'</strong></p><p style="font-size:.85rem">Trains: <strong>'+(s.trains_detected||0).toLocaleString()+'</strong></p><p style="font-size:.85rem">Rate: <strong>'+(s.detection_rate||0)+'%</strong></p><div class="progress-bar"><div class="fill" style="width:'+Math.min(s.detection_rate||0,100)+'%;background:'+(s.detection_rate>10?'#22c55e':'#f59e0b')+'"></div></div><p style="font-size:.75rem;margin-top:8px;font-style:italic">Started: '+new Date(s.start_time).toLocaleString()+'</p></div>').join('')+'</div></div></div>';
}

function updateCharts() {
  const t = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const totalP = sessions.reduce((a,s)=>a+(s.frames_processed||0),0);
  const totalD = sessions.reduce((a,s)=>a+(s.trains_detected||0),0);
  const totalDisc = sessions.reduce((a,s)=>a+(s.frames_discarded||0),0);
  chartData.push({time:t,processed:totalP,detected:totalD,discarded:totalDisc});
  if (chartData.length>20) chartData.shift();

  // Line chart
  if (!perfChart) {
    const ctx = document.getElementById('perfChart');
    if(!ctx) return;
    perfChart = new Chart(ctx, {
      type:'line',
      data:{
        labels:chartData.map(d=>d.time),
        datasets:[
          {label:'Frames Processed',data:chartData.map(d=>d.processed),borderColor:'#FFB000',borderWidth:3,pointBackgroundColor:'#FFB000',tension:.3,fill:false},
          {label:'Frames Discarded',data:chartData.map(d=>d.discarded),borderColor:'#ef4444',borderWidth:3,pointBackgroundColor:'#ef4444',tension:.3,fill:false},
          {label:'Trains Detected',data:chartData.map(d=>d.detected),borderColor:'#22c55e',borderWidth:3,pointBackgroundColor:'#22c55e',tension:.3,fill:false}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#ccc'}}},scales:{x:{ticks:{color:'#aaa',maxTicksLimit:10},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#aaa'},grid:{color:'rgba(255,255,255,.08)'}}}}
    });
  } else {
    perfChart.data.labels = chartData.map(d=>d.time);
    perfChart.data.datasets[0].data = chartData.map(d=>d.processed);
    perfChart.data.datasets[1].data = chartData.map(d=>d.discarded);
    perfChart.data.datasets[2].data = chartData.map(d=>d.detected);
    perfChart.update('none');
  }

  // Pie chart
  const pieData = sessions.map(s=>({name:s.stream_name,det:s.trains_detected||0}));
  const colors = ['#8884d8','#82ca9d','#ffc658','#ff7c7c','#8dd1e1','#d084d0'];
  if (!pieChart) {
    const ctx2 = document.getElementById('pieChart');
    if(!ctx2) return;
    pieChart = new Chart(ctx2, {
      type:'doughnut',
      data:{
        labels:pieData.map(d=>d.name),
        datasets:[{data:pieData.map(d=>d.det),backgroundColor:colors.slice(0,pieData.length),borderWidth:0}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#ccc',padding:12}}}}
    });
  } else {
    pieChart.data.labels = pieData.map(d=>d.name);
    pieChart.data.datasets[0].data = pieData.map(d=>d.det);
    pieChart.data.datasets[0].backgroundColor = colors.slice(0,pieData.length);
    pieChart.update('none');
  }
}

/* ─── POLLING ─────────────────────────────── */
function startPolling() {
  stopPolling();
  pollingInterval = setInterval(async()=>{
    try {
      const d = await api('/analysis/sessions');
      sessions = d.active_sessions || [];
      renderMultiStream();
      if (document.getElementById('innerTab1').classList.contains('active')) {
        renderStatCards();
        renderSessionDetailCards();
        updateCharts();
      }
    } catch(_){}
  }, 3000);
}
function stopPolling() { if(pollingInterval){clearInterval(pollingInterval);pollingInterval=null;} }

/* ═══════════════ CALENDAR ═══════════════ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function toKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

async function loadAllEvents() {
  try {
    const d = await api('/railway-events?limit=2000&skip=0');
    allEvents = d.events || [];
    renderCalendar();
    renderCalendarEvents();
  } catch(e){ console.error(e); }
}

function renderCalendar() {
  const today = new Date();
  const first = new Date(calYear,calMonth,1).getDay();
  const days = new Date(calYear,calMonth+1,0).getDate();
  const eventDates = new Set(allEvents.map(e=>e.start_time?toKey(new Date(e.start_time)):null).filter(Boolean));
  const selKey = toKey(selectedCalDate);
  const todayKey = toKey(today);

  let html = '<div class="cal-header"><h3>'+MONTHS[calMonth]+' '+calYear+'</h3><div style="display:flex;gap:6px"><button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()">&lt;</button><button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()">&gt;</button></div></div>';
  html+='<div class="weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="days">';
  for(let i=0;i<first;i++) html+='<button class="day-btn empty"></button>';
  for(let d=1;d<=days;d++){
    const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cls = key===selKey?'selected':key===todayKey?'today':eventDates.has(key)?'has-events':'';
    html+='<button class="day-btn '+cls+'" onclick="selectCalDate('+calYear+','+calMonth+','+d+')">'+d+'</button>';
  }
  html+='</div>';
  document.getElementById('calendar').innerHTML=html;
  document.getElementById('selectedDateLabel').textContent=selectedCalDate.toLocaleDateString();
}

function selectCalDate(y,m,d){
  selectedCalDate=new Date(y,m,d);
  renderCalendar();
  renderCalendarEvents();
}

function renderCalendarEvents(){
  const key=toKey(selectedCalDate);
  const dayEvents=allEvents.filter(e=>e.start_time&&toKey(new Date(e.start_time))===key);
  const el=document.getElementById('calendarEvents');
  if(!dayEvents.length){el.innerHTML='<div style="text-align:center;padding:40px"><span class="material-icons" style="font-size:60px;color:#555">train</span><p style="color:#aaa;margin-top:12px">No events for this date.</p></div>';return;}
  el.innerHTML='<table><tr style="background:#1f1f1f"><th style="background:#1f1f1f;color:#FFC107">Time</th><th style="background:#1f1f1f;color:#FFC107">Reporting Marks</th><th style="background:#1f1f1f;color:#FFC107">Location</th><th style="background:#1f1f1f;color:#FFC107">Units</th><th style="background:#1f1f1f;color:#FFC107">Duration</th></tr>'+dayEvents.map(e=>{
    const t=new Date(e.start_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const marks=e.reporting_marks||[];
    const dur=e.duration_seconds!=null?(Math.floor(e.duration_seconds/60)+':'+String(e.duration_seconds%60).padStart(2,'0')):'—';
    return '<tr><td style="color:#fff;font-weight:500">'+t+'</td><td>'+(marks[0]?'<span style="color:#FFC107;font-weight:600">'+marks[0]+'</span>'+(marks.length>1?' <span class="chip primary">+'+( marks.length-1)+'</span>':''):'—')+'</td><td style="color:#64B5F6;font-weight:600">'+(e.stream_name||'—')+'</td><td><span class="chip primary">'+(e.units_count||0)+'</span></td><td><span class="chip success">'+dur+'</span></td></tr>';
  }).join('')+'</table>';
}

/* ═══════════════ DASHBOARD ═══════════════ */
async function loadDashboard(){
  const el=document.getElementById('dashboardTable');
  el.innerHTML='<div class="spinner"></div>';
  try{
    const d=await api('/railway-events?limit=50&skip=0');
    const events=d.events||[];
    if(!events.length){el.innerHTML='<p style="text-align:center;padding:40px;color:#aaa">No railway events available</p>';return;}
    const fmt=ts=>{try{return new Date(ts).toLocaleString('en-US',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}catch(_){return'—'}};
    const fmtDur=s=>{if(s==null)return'—';const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);return h>0?h+'h '+m+'m '+sec+'s':m>0?m+'m '+sec+'s':sec+'s'};
    el.innerHTML='<span class="chip primary" style="margin-bottom:12px;display:inline-flex"><span class="material-icons" style="font-size:1rem">train</span> '+d.total+' events</span><table><tr><th>Start</th><th>End</th><th>Duration</th><th>Frames</th><th>Units</th><th>Reporting Marks</th><th>Image</th></tr>'+events.map(e=>'<tr><td>'+fmt(e.start_time)+'</td><td>'+(e.end_time?fmt(e.end_time):'— (active)')+'</td><td style="font-weight:700">'+fmtDur(e.duration_seconds)+'</td><td style="text-align:center">'+(e.frames_count||0)+'</td><td style="text-align:center">'+(e.units_count||0)+'</td><td>'+(e.reporting_marks||[]).slice(0,4).map(r=>'<span class="chip primary" style="margin:1px">'+r+'</span>').join('')+((e.reporting_marks||[]).length>4?'<span class="chip primary">+'+(e.reporting_marks.length-4)+'</span>':'')+'</td><td style="text-align:center">'+(e.last_frame?'<img src="'+API+'/frame/'+e.last_frame+'" style="width:80px;height:50px;object-fit:cover;border-radius:4px;border:1px solid rgba(255,193,7,.2)"/>':'—')+'</td></tr>').join('')+'</table>';
  }catch(e){el.innerHTML='<p style="color:#f44336">Error: '+e.message+'</p>';}
}

/* ═══════════════ FRAME GALLERY ═══════════════ */
async function loadFrames(){
  const el=document.getElementById('frameGrid');
  el.innerHTML='<div class="spinner" style="grid-column:1/-1"></div>';
  const filter=document.getElementById('frameFilter').value;
  try{
    const d=await api('/frames?limit=12&skip='+((framesPage-1)*12)+(filter?'&stream_id='+filter:''));
    const frames=d.frames||[];
    document.getElementById('framesCount').textContent=(d.total||0)+' saved frames';
    document.getElementById('framesStats').innerHTML='Processed: '+(d.frames_processed||0)+' | Saved: '+(d.total||0)+' | Discarded: '+(d.frames_discarded||0);
    if(!frames.length){el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px"><span class="material-icons" style="font-size:60px;color:#555">photo_camera</span><p style="color:#aaa;margin-top:12px">No frames available</p></div>';return;}
    el.innerHTML=frames.map(f=>{
      const date=new Date(f.timestamp).toLocaleString();
      const kb=f.size?(f.size/1024).toFixed(1):'—';
      const hasTrain=f.has_trains||f.detection_count>0;
      const dets=f.detections||[];
      const avgConf=dets.length?(dets.reduce((a,d)=>a+d.confidence,0)/dets.length*100).toFixed(1):0;
      return '<div class="card frame-card"><img src="'+API+'/frame/'+f.filename+'" alt="'+f.filename+'" loading="lazy"/><div class="frame-info"><p style="font-size:.75rem;color:#aaa;margin-bottom:4px">'+date+'</p><p style="font-size:.8rem;color:#aaa;margin-bottom:6px">'+kb+' KB</p><span class="chip '+(hasTrain?'success':'error')+'">'+(hasTrain?(f.detection_count||1)+' Railcar':'No Railcars')+'</span>'+(hasTrain&&f.total_serials?'<span class="chip primary" style="margin-left:4px">'+f.total_serials+' Marks</span>':'')+(hasTrain&&avgConf>0?'<p style="font-size:.75rem;color:#aaa;margin-top:6px">Avg confidence: '+avgConf+'%</p>':'')+'</div></div>';
    }).join('');
    // Pagination
    const totalPages=Math.ceil((d.total||0)/12);
    let pgHtml='';
    for(let i=1;i<=totalPages&&i<=10;i++) pgHtml+='<button class="'+(i===framesPage?'active':'')+'" onclick="framesPage='+i+';loadFrames()">'+i+'</button>';
    document.getElementById('framesPagination').innerHTML=pgHtml;
  }catch(e){el.innerHTML='<p style="color:#f44336;grid-column:1/-1">Error: '+e.message+'</p>';}
}

async function loadFrameFilters(){
  try{
    const d=await api('/streams?active_only=false');
    const sel=document.getElementById('frameFilter');
    (d.streams||[]).forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
  }catch(_){}
}

/* ═══════════════ INIT ═══════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  loadStreams();
  loadFrameFilters();
});
</script>
