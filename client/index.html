<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Railytics Catalyst</title>
<link rel="icon" type="image/jpeg" href="./favicon.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link rel="preconnect" href="https://www.youtube.com" crossorigin/>
<link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin/>
<link rel="dns-prefetch" href="https://www.youtube.com"/>
<link rel="dns-prefetch" href="https://www.youtube-nocookie.com"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#000 0%,#1a1a00 100%);color:#fff;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
::-webkit-scrollbar-thumb{background:#FFC107;border-radius:3px}
a{color:#FFC107;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

/* ═══════════════ HEADER ═══════════════ */
.header{position:fixed;top:0;left:0;right:0;z-index:1200;background:#FFAD01;display:flex;align-items:center;padding:8px 20px;min-height:100px}
.header .hamburger{background:none;color:#000;font-size:2rem;padding:12px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.2s;flex:0 0 80px}
.header .hamburger:hover{background:rgba(0,0,0,.1);transform:scale(1.05)}
.header .logo{height:80px;margin-left:12px;object-fit:contain}
.header-spacer{height:100px}

/* ═══════════════ DRAWER ═══════════════ */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1300;opacity:0;pointer-events:none;transition:.3s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:#1a1a1a;border-right:1px solid rgba(255,193,7,.3);z-index:1400;transform:translateX(-100%);transition:.3s}
.drawer.open{transform:translateX(0)}
.drawer .flag{width:100%;display:block;border-bottom:1px solid rgba(255,193,7,.3)}
.drawer .menu-item{display:flex;align-items:center;gap:12px;padding:14px 20px;color:#fff;font-size:.95rem;font-weight:400;transition:.2s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.drawer .menu-item:hover{background:rgba(255,193,7,.1)}
.drawer .menu-item.active{background:rgba(255,193,7,.2);color:#FFC107;font-weight:600}
.drawer .menu-item .material-icons{color:#FFC107;font-size:1.4rem}

/* ═══════════════ CONTAINER ═══════════════ */
.container{max-width:100%;margin:0 auto;padding:16px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ═══════════════ CARDS ═══════════════ */
.card{background:rgba(10,10,10,.95);backdrop-filter:blur(10px);border:1px solid rgba(255,193,7,.2);border-radius:15px;overflow:hidden;transition:.3s}
.card:hover{border-color:rgba(255,193,7,.4);box-shadow:0 4px 20px rgba(255,176,0,.1)}
.card-content{padding:16px}

/* ═══════════════ STREAM GRID ═══════════════ */
.stream-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px}
.stream-card{display:flex;flex-direction:column;height:100%}
.stream-card .yt-embed{position:relative;width:100%;padding-bottom:56.25%;background:#000}
.stream-card .yt-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.stream-card .live-badge{position:absolute;top:8px;left:8px;background:#f44336;color:#fff;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700;z-index:1;display:flex;align-items:center;gap:4px}
.stream-card h3{font-size:1rem;font-weight:600;margin-bottom:6px}
.stream-card .meta{font-size:.8rem;color:#aaa;margin-bottom:8px}

/* ═══════════════ CHIPS ═══════════════ */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:16px;font-size:.75rem;font-weight:500}
.chip.success{background:rgba(76,175,80,.2);color:#4CAF50;border:1px solid rgba(76,175,80,.4)}
.chip.error{background:rgba(244,67,54,.2);color:#f44336;border:1px solid rgba(244,67,54,.4)}
.chip.warning{background:rgba(255,152,0,.2);color:#ff9800;border:1px solid rgba(255,152,0,.4)}
.chip.live{background:#f44336;color:#fff}
.chip.primary{background:rgba(255,193,7,.2);color:#FFC107;border:1px solid rgba(255,193,7,.4)}
.chip.secondary{background:rgba(255,235,59,.15);color:#FFEB3B;border:1px solid rgba(255,235,59,.3)}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:8px;font-size:.85rem;font-weight:600;transition:.2s;text-transform:none}
.btn-primary{background:#FFC107;color:#000}
.btn-primary:hover{background:#FFD54F}
.btn-primary:disabled{background:#666;color:#999;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid #FFC107;color:#FFC107}
.btn-outline:hover{background:rgba(255,193,7,.1)}
.btn-error{background:transparent;border:1px solid #f44336;color:#f44336}
.btn-error:hover{background:rgba(244,67,54,.1)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-warning{background:#FFC107;color:#000;font-weight:700}
.btn-warning:hover{background:#FFD54F}

/* ═══════════════ ALERT ═══════════════ */
.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.9rem}
.alert.info{background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.3);color:#90CAF9}

/* ═══════════════ TABLE ═══════════════ */
table{width:100%;border-collapse:collapse}
table th{background:#FFAD01;color:#000;font-weight:700;padding:10px 14px;text-align:left;font-size:.85rem}
table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
table tr:hover{background:rgba(255,193,7,.05)}

/* ═══════════════ TABS (inner) ═══════════════ */
.tabs-bar{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:20px}
.tab-btn{padding:10px 20px;font-size:.9rem;color:#aaa;background:none;border:none;border-bottom:2px solid transparent;transition:.2s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:#FFC107;border-bottom-color:#FFC107}
.inner-tab{display:none}
.inner-tab.active{display:block}

/* ═══════════════ STAT CARDS ═══════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.stat-card{background:linear-gradient(135deg,#2a2a2a,#1a1a1a);border:2px solid #FFB000;border-radius:16px;padding:20px;position:relative;overflow:hidden;height:180px;display:flex;flex-direction:column;justify-content:space-between}
.stat-card .label{color:#ccc;font-size:.8rem;margin-bottom:8px}
.stat-card .value{font-size:2.5rem;font-weight:700;color:#fff}
.stat-card .sub{font-size:.8rem;color:#22c55e;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Live Detection Card (wide) */
.stat-card.wide{grid-column:span 3}
.stat-card .live-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-card .live-dot{width:12px;height:12px;background:#ef4444;border-radius:50%;animation:pulse 2s infinite}
.stat-card .live-status{display:flex;align-items:center;gap:6px;color:#22c55e;font-size:.8rem;font-weight:600}
.stat-card .live-status .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1s infinite}
.detection-row{display:flex;align-items:center;min-height:50px;margin-bottom:6px}
.detection-row .bar{width:4px;height:40px;background:#FFB000;border-radius:2px;margin-right:12px;flex-shrink:0}
.detection-row .det-time{color:#FFB000;font-size:.75rem;min-width:60px;flex-shrink:0}
.detection-row .det-icon{background:#FFB000;border-radius:4px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 8px;flex-shrink:0}
.detection-row .det-icon .material-icons{font-size:12px;color:#000}
.detection-row .det-label{color:#FFB000;font-weight:600;font-size:.85rem;margin-right:6px;flex-shrink:0}
.detection-row .det-at{color:#fff;font-size:.85rem;margin-right:6px;flex-shrink:0}
.detection-row .det-stream{color:#4A90E2;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.detection-row .det-sub{color:#ccc;font-size:.7rem;display:block}

/* ═══════════════ CHARTS ═══════════════ */
.chart-container{background:#000;border-radius:8px;padding:16px;position:relative}

/* ═══════════════ CALENDAR ═══════════════ */
.calendar{background:#1a1a1a;border:1px solid rgba(255,173,1,.2);border-radius:12px;padding:24px;max-width:520px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.calendar .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.calendar .cal-header h3{font-size:1.5rem;font-weight:700}
.calendar .cal-nav{background:rgba(255,193,7,.1);color:#FFC107;border:none;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:.2s}
.calendar .cal-nav:hover{background:rgba(255,193,7,.2);transform:scale(1.05)}
.calendar .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px}
.calendar .weekdays span{color:rgba(255,255,255,.6);font-size:.875rem;padding:12px 0;font-weight:600;letter-spacing:.5px}
.calendar .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calendar .day-cell{display:flex;justify-content:center;align-items:center;height:56px;padding:4px}
.calendar .day-btn{background:none;border:none;color:rgba(255,255,255,.8);min-width:44px;height:44px;border-radius:8px;font-size:.95rem;font-weight:500;transition:.2s}
.calendar .day-btn:hover{background:rgba(255,255,255,.1);color:#FFC107;transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.calendar .day-btn.today{background:#FFC107;color:#000;font-weight:700}
.calendar .day-btn.selected{background:#4CAF50;color:#000;font-weight:700}
.calendar .day-btn.has-events{background:rgba(100,181,246,.8);color:#000;font-weight:600;border:1px solid rgba(100,181,246,.5)}
.calendar .day-btn.empty{visibility:hidden}
.calendar .legend{display:flex;justify-content:center;gap:24px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.calendar .legend-item{display:flex;align-items:center;gap:8px}
.calendar .legend-color{width:16px;height:16px;border-radius:4px}
.calendar .legend-text{color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500}

/* ═══════════════ SESSION CARDS ═══════════════ */
.session-card{background:linear-gradient(135deg,#FFB000,#FFC733);color:#1a1a1a;border-radius:16px;padding:20px;border:2px solid #E09900;position:relative;overflow:hidden;transition:.3s;box-shadow:0 4px 15px rgba(255,176,0,.2)}
.session-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,176,0,.3)}
.session-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#22c55e,#16a34a)}
.session-card h4{font-weight:700;margin-bottom:8px;color:#1a1a1a}
.session-card .progress-bar{height:8px;background:rgba(26,26,26,.2);border-radius:4px;overflow:hidden;margin-top:8px}
.session-card .progress-bar .fill{height:100%;border-radius:4px;transition:.5s}

/* ═══════════════ FRAME GALLERY ═══════════════ */
.frame-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.frame-card img{width:100%;height:200px;object-fit:cover;display:block;border-radius:15px 15px 0 0}
.frame-card .frame-info{padding:12px}

/* ═══════════════ MODAL/DIALOG ═══════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1e1e1e;border-radius:12px;width:90vw;max-width:1100px;max-height:90vh;overflow:auto;border:1px solid rgba(255,193,7,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.modal-body{padding:20px}
.modal-body iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:8px}
.modal-close{background:none;color:#fff;font-size:1.5rem;padding:4px;border-radius:50%;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.1)}

/* ═══════════════ PAGINATION ═══════════════ */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}
.pagination button{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);padding:6px 12px;border-radius:6px;font-size:.85rem;transition:.2s}
.pagination button:hover{background:rgba(255,193,7,.15);border-color:#FFC107}
.pagination button.active{background:#FFC107;color:#000;font-weight:600}

/* ═══════════════ RECENT DETECTIONS TABLE ═══════════════ */
.det-table-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:16px;padding-bottom:12px;margin-bottom:16px;border-bottom:2px solid #FFB000;text-align:center}
.det-table-header span{color:#FFB000;font-weight:700;font-size:1rem}
.det-table-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:16px;align-items:center;padding:16px;border-left:6px solid #FFB000;background:rgba(255,176,0,.03);border-radius:12px;text-align:center;transition:.3s;margin-bottom:8px}
.det-table-row:hover{background:rgba(255,176,0,.08);transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,176,0,.2)}

/* ═══════════════ RAILWAY EVENTS PAPER ═══════════════ */
.events-paper{position:relative;overflow:hidden;border-radius:8px;border:1px solid #FFC107;background:linear-gradient(180deg,rgba(10,10,10,.98),rgba(10,10,10,.92))}
.events-paper::before{content:'';position:absolute;top:0;bottom:0;left:0;width:6px;background:#FFC107}

/* ═══════════════ LOADING ═══════════════ */
.spinner{width:40px;height:40px;border:4px solid rgba(255,193,7,.2);border-top-color:#FFC107;border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}
.pulse{animation:pulse 2s infinite}

/* ═══════════════ SELECT ═══════════════ */
.select{background:#1e1e1e;color:#fff;border:1px solid rgba(255,193,7,.3);padding:8px 12px;border-radius:6px;font-size:.85rem;font-family:inherit}
.select:focus{border-color:#FFC107;outline:none}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:1200px){
  .stat-grid{grid-template-columns:1fr 1fr 1fr}
  .stat-card.wide{grid-column:span 3}
  .det-table-header,.det-table-row{grid-template-columns:1fr 1fr 1fr 1fr 1fr;font-size:.8rem}
}
@media(max-width:768px){
  .stream-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-card.wide{grid-column:span 2}
  .frame-grid{grid-template-columns:1fr 1fr}
  .det-table-header,.det-table-row{grid-template-columns:1fr 1fr 1fr;font-size:.75rem}
}
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="header">
  <button class="hamburger" onclick="toggleDrawer()"><span class="material-icons" style="font-size:2.5rem">menu</span></button>
  <img src="./up_logo.jpg" alt="UP" class="logo"/>
  <div style="flex:1"></div>
</header>
<div class="header-spacer"></div>

<!-- ═══════════════ DRAWER ═══════════════ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
  <img src="./usa_flag.jpg" alt="USA" class="flag"/>
  <button class="menu-item active" onclick="switchTab(0)"><span class="material-icons">video_call</span>STREAM SELECTION</button>
  <button class="menu-item" onclick="switchTab(1)"><span class="material-icons">analytics</span>REAL-TIME ANALYSIS</button>
  <button class="menu-item" onclick="switchTab(2)"><span class="material-icons">dashboard</span>DASHBOARD</button>
  <button class="menu-item" onclick="switchTab(3)"><span class="material-icons">photo_library</span>FRAME GALLERY</button>
</nav>

<!-- ═══════════════ CONTENT ═══════════════ -->
<div class="container">

<!-- ════ TAB 0: STREAM SELECTION ════ -->
<div class="tab-panel active" id="tab0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h2 style="font-weight:600"></h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="startAllAnalysis()"><span class="material-icons" style="font-size:1rem">play_arrow</span> Start All</button>
      <button class="btn btn-error btn-sm" onclick="stopAllAnalysis()"><span class="material-icons" style="font-size:1rem">stop</span> Stop All</button>
    </div>
  </div>
  <div id="sessionsAlert"></div>
  <div class="stream-grid" id="streamGrid"></div>
</div>

<!-- ════ TAB 1: REAL-TIME ANALYSIS ════ -->
<div class="tab-panel" id="tab1">
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchInnerTab(0,this)"><span class="material-icons" style="font-size:1.1rem">table_view</span> Multi-Stream View</button>
    <button class="tab-btn" onclick="switchInnerTab(1,this)"><span class="material-icons" style="font-size:1.1rem">bar_chart</span> Analytics</button>
    <button class="tab-btn" onclick="switchInnerTab(2,this)"><span class="material-icons" style="font-size:1.1rem">show_chart</span> Historical</button>
  </div>
  <!-- Inner Tab 0: Multi-Stream -->
  <div class="inner-tab active" id="innerTab0">
    <div id="multiStreamContent"></div>
  </div>
  <!-- Inner Tab 1: Analytics -->
  <div class="inner-tab" id="innerTab1">
    <div id="analyticsContent">
      <h2 style="font-weight:700;color:#FFC107;margin-bottom:24px;padding:0 8px">📊 Real-Time Stream Analytics Dashboard</h2>
      <!-- Stat Cards Row -->
      <div class="stat-grid" id="statCards"></div>
      <!-- Line Chart -->
      <div class="card" style="margin-bottom:24px">
        <div class="card-content">
          <h3 style="margin-bottom:12px">📈 Real-Time Performance Metrics</h3>
          <div class="chart-container" style="height:400px"><canvas id="perfChart"></canvas></div>
        </div>
      </div>
      <!-- Pie Chart -->
      <div class="card" style="margin-bottom:24px;padding:0 16px">
        <div class="card-content">
          <h3 style="margin-bottom:12px">🎯 Detection Rate by Stream</h3>
          <div style="display:flex;justify-content:center;margin-bottom:16px">
            <div class="chart-container" style="max-width:600px;width:100%;height:450px"><canvas id="pieChart"></canvas></div>
          </div>
          <h4 style="text-align:center;font-weight:700;margin-bottom:16px">📋 Stream Legend</h4>
          <div id="pieLegend" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px"></div>
        </div>
      </div>
      <!-- Active Sessions Detail -->
      <div id="sessionCards"></div>
      <!-- Recent Detections Table -->
      <div id="recentDetections"></div>
    </div>
  </div>
  <!-- Inner Tab 2: Historical -->
  <div class="inner-tab" id="innerTab2">
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:24px;align-items:start">
      <div>
        <h3 style="color:#FFC107;margin-bottom:12px;font-weight:600">📅 Event Calendar</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
          <span style="color:#aaa;font-size:.85rem;min-width:60px">Location:</span>
          <select class="select" id="calLocationFilter" onchange="onCalLocationChange()" style="flex:1">
            <option value="ALL">ALL</option>
          </select>
        </div>
        <div class="calendar" id="calendar"></div>
      </div>
      <div>
        <h3 style="color:#FFC107;margin-bottom:12px;font-weight:600">📊 Events for <span id="selectedDateLabel"></span></h3>
        <div class="card"><div class="card-content" id="calendarEvents"><p style="color:#aaa;text-align:center;padding:40px">Select a date to view events</p></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ════ TAB 2: DASHBOARD ════ -->
<div class="tab-panel" id="tab2">
  <div class="events-paper" style="padding-left:12px">
    <div style="padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="display:flex;align-items:center;gap:8px"><span class="material-icons" style="color:#FFEB3B">event</span> Railway Events</h2>
        <button class="btn btn-outline btn-sm" onclick="loadDashboard()"><span class="material-icons" style="font-size:1rem">refresh</span></button>
      </div>
      <div id="dashboardChips" style="margin-bottom:16px"></div>
      <div id="dashboardTable"></div>
    </div>
  </div>
</div>

<!-- ════ TAB 3: FRAME GALLERY ════ -->
<div class="tab-panel" id="tab3">
  <div class="card" style="margin-bottom:20px;padding:24px">

let simSessions = [];
let simFramesProcessed = {};
let simTrainsDetected = {};
let simFramesDiscarded = {};
let simRailwayEvents = [];
let simFrames = [];

function initSimData() {
  // Create sessions for active streams
  simSessions = SIM_STREAMS.filter(s => s.active).map(s => {
    const fp = Math.floor(Math.random() * 500) + 200;
    const td = Math.floor(fp * (Math.random() * 0.15 + 0.05));
    const fd = fp - td;
    simFramesProcessed[s.id] = fp;
    simTrainsDetected[s.id] = td;
    simFramesDiscarded[s.id] = fd;
    return {
      stream_id: s.id,
      stream_name: s.name,
      active: true,
      frames_processed: fp,
      trains_detected: td,
      frames_discarded: fd,
      detection_rate: parseFloat(((td / fp) * 100).toFixed(1)),
      runtime_seconds: Math.floor(Math.random() * 7200) + 600,
      start_time: new Date(Date.now() - Math.floor(Math.random() * 7200000) - 600000).toISOString()
    };
  });

  // Generate railway events
  const locations = SIM_STREAMS.map(s => s.name);
  const marks = ['UP','BNSF','CSX','NS','CN','CP','KCS','FEC','GATX','UTLX','TILX','DTTX','TTGX','FBOX','TBOX'];
  for (let i = 0; i < 120; i++) {
    const dayOffset = Math.floor(i / 4);
    const baseDate = new Date();
    baseDate.setDate(baseDate.getDate() - dayOffset);
    baseDate.setHours(Math.floor(Math.random() * 18) + 5, Math.floor(Math.random() * 60), Math.floor(Math.random() * 60));
    const durSec = Math.floor(Math.random() * 300) + 30;
    const endDate = new Date(baseDate.getTime() + durSec * 1000);
    const numMarks = Math.floor(Math.random() * 5) + 1;
    const eventMarks = [];
    for (let j = 0; j < numMarks; j++) {
      const m = marks[Math.floor(Math.random() * marks.length)];
      const num = Math.floor(Math.random() * 900000) + 100000;
      eventMarks.push(m + ' ' + num);
    }
    simRailwayEvents.push({
      id: 'evt-' + (i + 1),
      start_time: baseDate.toISOString(),
      end_time: endDate.toISOString(),
      duration_seconds: durSec,
      frames_count: Math.floor(Math.random() * 60) + 5,
      units_count: Math.floor(Math.random() * 8) + 1,
      reporting_marks: eventMarks,
      stream_name: locations[Math.floor(Math.random() * locations.length)],
      last_frame: null
    });
  }
  simRailwayEvents.sort((a, b) => new Date(b.start_time) - new Date(a.start_time));

  // Generate frames
  for (let i = 0; i < 48; i++) {
    const d = new Date();
    d.setMinutes(d.getMinutes() - i * 3);
    const hasTrain = Math.random() > 0.3;
    simFrames.push({
      filename: 'frame_' + String(i + 1).padStart(4, '0') + '.jpg',
      timestamp: d.toISOString(),
      size: Math.floor(Math.random() * 500000) + 50000,
      has_trains: hasTrain,
      detection_count: hasTrain ? Math.floor(Math.random() * 4) + 1 : 0,
      total_serials: hasTrain ? Math.floor(Math.random() * 3) : 0,
      detections: hasTrain ? [{ confidence: Math.random() * 0.3 + 0.7 }] : [],
      stream_id: SIM_STREAMS[Math.floor(Math.random() * SIM_STREAMS.length)].id,
      stream_name: SIM_STREAMS[Math.floor(Math.random() * SIM_STREAMS.length)].name
    });
  }
}
initSimData();

/* ─── Simulate incremental updates ────── */
function tickSimulation() {
  simSessions.forEach(s => {
    const inc = Math.floor(Math.random() * 3) + 1;
    s.frames_processed += inc;
    const newDet = Math.random() < 0.15 ? 1 : 0;
    s.trains_detected += newDet;
    s.frames_discarded += (inc - newDet);
    s.detection_rate = parseFloat(((s.trains_detected / s.frames_processed) * 100).toFixed(1));
    s.runtime_seconds += 2;
    simFramesProcessed[s.stream_id] = s.frames_processed;
    simTrainsDetected[s.stream_id] = s.trains_detected;
    simFramesDiscarded[s.stream_id] = s.frames_discarded;
  });
}

/* ─── API HELPERS (simulation mode) ───── */
async function api(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return r.json();
  } catch (e) {
    return null;
  }
}
async function apiPost(path, body) {
  try {
    const r = await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
    return r.json();
  } catch (e) {
    return null;
  }
}

/* ─── YOUTUBE HELPERS ─────────────────────── */
function getVideoId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^#&?]{11})/);
  return m ? m[1] : null;
}
function embedUrl(url) {
  const id = getVideoId(url);
  return id ? 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1' : '';
}
function embedUrlFull(url) {
  const id = getVideoId(url);
  return id ? 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&mute=0&controls=1&modestbranding=1&rel=0&fs=1' : '';
}

function renderSessionsAlert() {
  const el = document.getElementById('sessionsAlert');
  if (!simSessions.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="alert info"><strong>🔄 ' + simSessions.length + ' Analysis Session(s) in Progress</strong><br/>' + simSessions.map(s => '<strong>' + s.stream_name + ':</strong> ' + s.frames_processed + ' frames, ' + s.trains_detected + ' trains (' + s.detection_rate + '%)').join(' | ') + '</div>';
}

function renderStreams() {
  const g = document.getElementById('streamGrid');
  renderSessionsAlert();
  const sessionMap = {};
  simSessions.forEach(s => sessionMap[s.stream_id] = s);
  g.innerHTML = SIM_STREAMS.map(s => {
    const analyzing = !!sessionMap[s.id];
    const meta = s.youtube_metadata || {};
    return '<div class="card stream-card"><div class="yt-embed">' + (meta.is_live ? '<span class="live-badge"><span class="material-icons" style="font-size:.7rem">live_tv</span> LIVE</span>' : '') + '<iframe src="' + embedUrl(s.url) + '" loading="lazy" allow="autoplay;encrypted-media" allowfullscreen></iframe></div><div class="card-content" style="flex-grow:1"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><h3>' + s.name + '</h3><div style="display:flex;gap:4px;flex-wrap:wrap"><span class="chip success">Active</span>' + (meta.is_live ? '<span class="chip live">LIVE</span>' : '') + (analyzing ? '<span class="chip warning"><span class="material-icons" style="font-size:.7rem">play_arrow</span> Analyzing</span>' : '') + '</div></div>' + (meta.title ? '<p style="font-size:.85rem;font-weight:500;margin-bottom:4px">' + meta.title + '</p>' : '') + (meta.uploader ? '<p class="meta">Channel: ' + meta.uploader + (meta.view_count > 0 ? ' &bull; ' + meta.view_count.toLocaleString() + ' views' : '') + '</p>' : '') + '<p class="meta">' + (s.description || 'No description') + '</p></div><div style="padding:0 16px 16px;display:flex;justify-content:space-between;align-items:center"><button class="btn btn-outline btn-sm" onclick="openViewer(\'' + s.url + '\',\'' + s.name.replace(/'/g, "\\'") + '\')"><span class="material-icons" style="font-size:1rem">visibility</span> Watch Stream</button>' + (analyzing ? '<button class="btn btn-error btn-sm" onclick="stopStream(\'' + s.id + '\')"><span class="material-icons" style="font-size:1rem">stop</span> Stop Analysis</button>' : '<button class="btn btn-primary btn-sm" onclick="startStream(\'' + s.id + '\')"><span class="material-icons" style="font-size:1rem">play_arrow</span> Start Analysis</button>') + '</div></div>';
  }).join('');
}

function startStream(id) {
  const stream = SIM_STREAMS.find(s => s.id === id);
  if (!stream || simSessions.find(s => s.stream_id === id)) return;
  simSessions.push({
    stream_id: id, stream_name: stream.name, active: true,
    frames_processed: 0, trains_detected: 0, frames_discarded: 0,
    detection_rate: 0, runtime_seconds: 0, start_time: new Date().toISOString()
  });
  simFramesProcessed[id] = 0; simTrainsDetected[id] = 0; simFramesDiscarded[id] = 0;
  renderStreams();
}
function stopStream(id) {
  simSessions = simSessions.filter(s => s.stream_id !== id);
  renderStreams();
}
function startAllAnalysis() {
  SIM_STREAMS.forEach(s => startStream(s.id));
}
function stopAllAnalysis() {
  simSessions = [];
  renderStreams();
}

    return;
  }
  const fmtDur = s => { const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = s % 60; return h > 0 ? h + 'h ' + m + 'm ' + sec + 's' : m > 0 ? m + 'm ' + sec + 's' : sec + 's'; };
  el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-weight:600">📊 Active Stream Analysis (' + simSessions.length + ')</h3><button class="btn btn-outline btn-sm" onclick="renderMultiStream()">Refresh</button></div><table><tr><th>Stream</th><th>Status</th><th>Runtime</th><th>Metrics</th><th>Detection Rate</th><th>Actions</th></tr>' + simSessions.map(s => '<tr><td><strong>' + s.stream_name + '</strong><br/><span style="color:#777;font-size:.75rem">ID: ' + s.stream_id + '</span></td><td><span class="chip ' + (s.active ? 'success' : 'error') + '"><span class="material-icons" style="font-size:.7rem">' + (s.active ? 'play_arrow' : 'stop') + '</span> ' + (s.active ? 'Running' : 'Stopped') + '</span></td><td><span style="display:flex;align-items:center;gap:4px"><span class="material-icons" style="font-size:1rem;color:#aaa">schedule</span>' + fmtDur(s.runtime_seconds || 0) + '</span></td><td><div style="display:flex;flex-direction:column;gap:4px"><span style="font-size:.8rem;color:#aaa"><span class="material-icons" style="font-size:.8rem;color:#FFC107;vertical-align:middle">analytics</span> Frames: <strong>' + (s.frames_processed || 0).toLocaleString() + '</strong></span><span style="font-size:.8rem;color:#aaa"><span class="material-icons" style="font-size:.8rem;color:#4CAF50;vertical-align:middle">train</span> Trains: <strong>' + (s.trains_detected || 0).toLocaleString() + '</strong></span></div></td><td><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span class="material-icons" style="font-size:1rem;color:#aaa">speed</span><strong>' + (s.detection_rate || 0) + '%</strong></div><div style="background:rgba(255,255,255,.1);height:6px;border-radius:3px;width:80px"><div style="background:' + (s.detection_rate > 20 ? '#4CAF50' : s.detection_rate > 10 ? '#ff9800' : '#f44336') + ';height:100%;border-radius:3px;width:' + Math.min(s.detection_rate || 0, 100) + '%;transition:.5s"></div></div></td><td><div style="display:flex;gap:4px"><button class="btn btn-outline btn-sm" onclick="openViewer(\'' + (SIM_STREAMS.find(st => st.id === s.stream_id)?.url || '') + '\',\'' + s.stream_name.replace(/'/g, "\\'") + '\')" title="View Stream"><span class="material-icons" style="font-size:1rem">visibility</span></button><button class="btn btn-error btn-sm" onclick="stopStream(\'' + s.stream_id + '\');renderMultiStream()"><span class="material-icons" style="font-size:1rem">stop</span></button></div></td></tr>').join('') + '</table>';
}

/* ═══════════════ ANALYTICS ═══════════════ */
function loadAnalytics() {
  renderStatCards();
  renderSessionDetailCards();
  renderRecentDetections();
  updateCharts();
}

function renderStatCards() {
  const total = simSessions.reduce((a, s) => ({ p: a.p + (s.frames_processed || 0), d: a.d + (s.trains_detected || 0) }), { p: 0, d: 0 });
  const rate = total.p > 0 ? ((total.d / total.p) * 100).toFixed(1) : 0;
  const t = new Date().toLocaleTimeString('en-US', { hour12: false });
  const mostActive = simSessions.reduce((best, s) => (!best || s.trains_detected > best.trains_detected ? s : best), null);

  let liveDetHtml = '';
  const withDets = simSessions.filter(s => (s.trains_detected || 0) > 0).sort((a, b) => b.trains_detected - a.trains_detected);
  if (withDets.length > 0) {
    liveDetHtml = withDets.map((s, i) => {
      const dt = new Date(Date.now() - i * 1000);
      return '<div class="detection-row"><div class="bar"></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="det-time">' + dt.toLocaleTimeString('en-US', { hour12: false }) + '</span><span class="det-icon"><span class="material-icons">train</span></span><span class="det-label">TRAIN ' + s.trains_detected + '</span><span class="det-at">detected at</span><span class="det-stream" title="' + s.stream_name + '">' + s.stream_name + '</span></div><span class="det-sub">Timestamp: ' + dt.toISOString().slice(0, 19).replace('T', ' ') + ' UTC | Confidence: ' + s.detection_rate.toFixed(1) + '%</span></div></div>';
    }).join('');
  } else {
    liveDetHtml = '<div style="display:flex;align-items:center;justify-content:center;height:100%"><span style="color:#ccc;font-style:italic">No active detections</span></div>';
  }

  document.getElementById('statCards').innerHTML =
    '<div class="stat-card wide"><div class="live-header"><div style="display:flex;align-items:center;gap:8px"><div class="live-dot"></div><span style="color:#fff;font-weight:600">Live Detection Stream</span></div><div class="live-status"><span class="dot"></span>LIVE TRACKING</div></div><div style="flex:1;overflow:auto">' + liveDetHtml + '</div></div>' +
    '<div class="stat-card"><div class="label">📍 ACTIVE STREAMS</div><div class="value">' + simSessions.length + '</div><div class="sub">' + (simSessions.length > 0 ? '↗ Currently monitoring' : 'No active monitoring') + '</div></div>' +
    '<div class="stat-card"><div class="label">⏰ LATEST CAPTURE</div><div class="value" style="font-size:1.4rem">' + t + '</div><div class="sub" title="' + (mostActive?.stream_name || 'No active location') + '">↗ ' + (mostActive?.stream_name || 'No active location') + '</div></div>' +
    '<div class="stat-card"><div class="label">🚂 TOTAL DETECTIONS</div><div class="value">' + total.d.toLocaleString() + '</div><div class="sub">↗ Detection rate: ' + rate + '%</div></div>';
}

function renderSessionDetailCards() {
  const el = document.getElementById('sessionCards');
  if (!simSessions.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="card" style="margin-bottom:24px"><div class="card-content"><h3 style="margin-bottom:16px">🚄 Active Analysis Sessions</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">' + simSessions.map(s => '<div class="session-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4>' + s.stream_name + '</h4><span class="chip ' + (s.active ? 'success' : 'error') + '" style="font-size:.7rem"><span class="material-icons" style="font-size:.7rem">' + (s.active ? 'play_arrow' : 'stop') + '</span> ' + (s.active ? 'Active' : 'Stopped') + '</span></div><p style="font-size:.85rem;color:#1a1a1a;font-weight:500">Frames Processed: <strong style="color:#0d0d0d">' + (s.frames_processed || 0).toLocaleString() + '</strong></p><p style="font-size:.85rem;color:#1a1a1a;font-weight:500">Trains Detected: <strong style="color:#0d0d0d">' + (s.trains_detected || 0).toLocaleString() + '</strong></p><p style="font-size:.85rem;color:#1a1a1a;font-weight:500">Detection Rate: <strong style="color:#0d0d0d">' + (s.detection_rate || 0) + '%</strong></p><div style="margin-top:4px"><span style="font-size:.7rem;color:#1a1a1a;font-weight:700">Detection Rate Progress</span><div class="progress-bar"><div class="fill" style="width:' + Math.min(s.detection_rate || 0, 100) + '%;background:' + (s.detection_rate > 10 ? '#22c55e' : '#f59e0b') + '"></div></div></div><p style="font-size:.75rem;margin-top:8px;font-style:italic;color:#1a1a1a;font-weight:500">Started: ' + new Date(s.start_time).toLocaleString() + '</p></div>').join('') + '</div></div></div>';
}

function renderRecentDetections() {
  const el = document.getElementById('recentDetections');
  const events = simRailwayEvents.slice(0, 6);
  if (!events.length) {
    el.innerHTML = '<div class="card" style="margin-bottom:24px"><div class="card-content" style="text-align:center;padding:48px"><h3 style="color:#ccc;font-style:italic">No recent railway events available</h3></div></div>';
    return;
  }
  el.innerHTML = '<div class="card" style="margin-bottom:24px"><div class="card-content" style="padding:24px"><h2 style="text-align:center;color:#FFB000;font-weight:700;margin-bottom:24px">🎯 Recent Detections - Core Properties</h2><div class="det-table-header"><span>⏰ TIMESTAMP</span><span>🏷️ REPORTING MARK</span><span>📍 LOCATION</span><span>DETECTIONS</span><span>CONFIDENCE</span></div>' + events.map(e => {
    const dt = new Date(e.start_time);
    const mark = e.reporting_marks.length > 0 ? e.reporting_marks[0] : '—';
    const conf = e.frames_count > 0 && e.units_count > 0 ? Math.min(95, Math.max(75, (e.units_count / e.frames_count) * 1000)).toFixed(1) : '';
    return '<div class="det-table-row"><span style="color:#FFB000;font-weight:600;font-size:1rem">' + dt.toLocaleTimeString('en-US', { hour12: true }) + '</span><span style="color:#FFB000;font-weight:700;font-size:1rem">' + mark + '</span><span style="color:#4A90E2;font-weight:600;font-size:1rem">' + (e.stream_name || '—') + '</span><span style="color:#fff;font-weight:600;font-size:1rem">' + (e.units_count > 0 ? e.units_count : '—') + '</span><span style="background:' + (conf ? (parseFloat(conf) > 90 ? '#22c55e' : '#FFB000') : 'rgba(255,255,255,.1)') + ';color:' + (conf ? '#000' : '#ccc') + ';padding:6px 12px;border-radius:16px;font-weight:700;font-size:1rem;display:inline-block">' + (conf ? conf + '%' : '—') + '</span></div>';
  }).join('') + '</div></div>';
}

function updateCharts() {
  const t = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const totalP = simSessions.reduce((a, s) => a + (s.frames_processed || 0), 0);
  const totalD = simSessions.reduce((a, s) => a + (s.trains_detected || 0), 0);
  const totalDisc = simSessions.reduce((a, s) => a + (s.frames_discarded || 0), 0);
  chartData.push({ time: t, processed: totalP, detected: totalD, discarded: totalDisc });
  if (chartData.length > 20) chartData.shift();

  // Line chart
  if (!perfChart) {
    const ctx = document.getElementById('perfChart');
    if (!ctx) return;
    perfChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.map(d => d.time),
        datasets: [
          { label: 'Frames Processed', data: chartData.map(d => d.processed), borderColor: '#FFB000', borderWidth: 4, pointBackgroundColor: '#FFB000', pointRadius: 5, tension: .3, fill: false },
          { label: 'Frames Discarded', data: chartData.map(d => d.discarded), borderColor: '#ef4444', borderWidth: 4, pointBackgroundColor: '#ef4444', pointRadius: 5, tension: .3, fill: false },
          { label: 'Trains Detected', data: chartData.map(d => d.detected), borderColor: '#22c55e', borderWidth: 4, pointBackgroundColor: '#22c55e', pointRadius: 5, tension: .3, fill: false }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 13 } } } },
        scales: {
          x: { ticks: { color: '#aaa', maxTicksLimit: 10, font: { size: 12 } }, grid: { color: 'rgba(255,255,255,.05)' } },
          y: { ticks: { color: '#aaa', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,.08)' } }
        }
      }
    });
  } else {
    perfChart.data.labels = chartData.map(d => d.time);
    perfChart.data.datasets[0].data = chartData.map(d => d.processed);
    perfChart.data.datasets[1].data = chartData.map(d => d.discarded);
    perfChart.data.datasets[2].data = chartData.map(d => d.detected);
    perfChart.update('none');
  }

  // Pie chart
  const pieData = simSessions.map(s => ({ name: s.stream_name, det: s.trains_detected || 0, rate: s.detection_rate || 0 }));
  const colors = ['#8884d8', '#82ca9d', '#ffc658', '#ff7c7c', '#8dd1e1', '#d084d0'];
  if (!pieChart) {
    const ctx2 = document.getElementById('pieChart');
    if (!ctx2) return;
    pieChart = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: pieData.map(d => d.name.length > 20 ? d.name.substring(0, 20) + '...' : d.name),
        datasets: [{ data: pieData.map(d => d.det), backgroundColor: colors.slice(0, pieData.length), borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#000', borderColor: '#404040', borderWidth: 1,
            bodyFont: { size: 13 }, titleFont: { size: 14 },
            callbacks: {
              label: function (ctx) { return pieData[ctx.dataIndex].name + ': ' + ctx.parsed + ' detections (' + pieData[ctx.dataIndex].rate + '%)'; }
            }
          }
        }
      }
    });
  } else {
    pieChart.data.labels = pieData.map(d => d.name.length > 20 ? d.name.substring(0, 20) + '...' : d.name);
    pieChart.data.datasets[0].data = pieData.map(d => d.det);
    pieChart.data.datasets[0].backgroundColor = colors.slice(0, pieData.length);
    pieChart.update('none');
  }

  // Legend
  const legendEl = document.getElementById('pieLegend');
  if (legendEl) {
    if (pieData.length === 0) {
      legendEl.innerHTML = '<div style="text-align:center;padding:16px;grid-column:1/-1"><span style="color:#ccc;font-style:italic">No active streams with detections</span></div>';
    } else {
      legendEl.innerHTML = pieData.map((d, i) => '<div style="display:flex;align-items:center;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:.3s"><div style="width:20px;height:20px;background:' + colors[i % colors.length] + ';border-radius:6px;margin-right:12px;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 4px rgba(0,0,0,.2);flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-weight:500;color:#fff;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + d.name + '">' + d.name + '</div><div style="color:#ccc;font-size:.8rem">' + d.det + ' detections (' + d.rate + '%)</div></div></div>').join('');
    }
  }
}

/* ─── POLLING ─────────────────────────────── */
function startPolling() {
  stopPolling();
  pollingInterval = setInterval(() => {
    tickSimulation();
    renderMultiStream();
    if (document.getElementById('innerTab1').classList.contains('active')) {
      renderStatCards();
      renderSessionDetailCards();
      renderRecentDetections();
      updateCharts();
    }
  }, 2000);
}
function stopPolling() { if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; } }

/* ═══════════════ CALENDAR ═══════════════ */
const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
function toKey(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

function getFilteredEvents() {
  if (calLocationFilter === 'ALL') return simRailwayEvents;
  return simRailwayEvents.filter(e => e.stream_name === calLocationFilter);
}

function populateCalLocationFilter() {
  const sel = document.getElementById('calLocationFilter');
  const selKey = toKey(selectedCalDate);
  const dayEventsAll = simRailwayEvents.filter(e => e.start_time && toKey(new Date(e.start_time)) === selKey);
  const counts = {};
  dayEventsAll.forEach(e => { const k = e.stream_name || 'Unknown'; counts[k] = (counts[k] || 0) + 1; });
  const locs = Object.keys(counts).sort();
  sel.innerHTML = '<option value="ALL">ALL (' + dayEventsAll.length + ')</option>' + locs.map(l => '<option value="' + l + '">' + l + ' (' + counts[l] + ')</option>').join('');
  sel.value = calLocationFilter;
}

function onCalLocationChange() {
  calLocationFilter = document.getElementById('calLocationFilter').value;
  calEventsPage = 0;
  renderCalendar();
  renderCalendarEvents();
}

function renderCalendar() {
  const today = new Date();
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  const filteredEvents = getFilteredEvents();
  const eventDates = new Set(filteredEvents.map(e => e.start_time ? toKey(new Date(e.start_time)) : null).filter(Boolean));
  const selKey = toKey(selectedCalDate);
  const todayKey = toKey(today);

  let html = '<div class="cal-header"><h3>' + MONTHS[calMonth] + ' ' + calYear + '</h3><div style="display:flex;gap:6px"><button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()">&lt;</button><button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()">&gt;</button></div></div>';
  html += '<div class="weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="days">';
  for (let i = 0; i < first; i++) html += '<div class="day-cell"><button class="day-btn empty"></button></div>';
  for (let d = 1; d <= days; d++) {
    const key = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const cls = key === selKey ? 'selected' : key === todayKey ? 'today' : eventDates.has(key) ? 'has-events' : '';
    html += '<div class="day-cell"><button class="day-btn ' + cls + '" onclick="selectCalDate(' + calYear + ',' + calMonth + ',' + d + ')">' + d + '</button></div>';
  }
  html += '</div>';
  // Legend
  html += '<div class="legend"><div class="legend-item"><div class="legend-color" style="background:#FFC107"></div><span class="legend-text">Today</span></div><div class="legend-item"><div class="legend-color" style="background:#4CAF50"></div><span class="legend-text">Selected</span></div><div class="legend-item"><div class="legend-color" style="background:rgba(100,181,246,.8);border:1px solid rgba(100,181,246,.5)"></div><span class="legend-text">Events</span></div></div>';
  document.getElementById('calendar').innerHTML = html;
  document.getElementById('selectedDateLabel').textContent = selectedCalDate.toLocaleDateString();
}

function selectCalDate(y, m, d) {
  selectedCalDate = new Date(y, m, d);
  calEventsPage = 0;
  renderCalendar();
  renderCalendarEvents();
  populateCalLocationFilter();
}

function renderCalendarEvents() {
  const key = toKey(selectedCalDate);
  const allDayEvents = simRailwayEvents.filter(e => e.start_time && toKey(new Date(e.start_time)) === key);
  const dayEvents = calLocationFilter === 'ALL' ? allDayEvents : allDayEvents.filter(e => e.stream_name === calLocationFilter);
  const el = document.getElementById('calendarEvents');
  if (!dayEvents.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px"><span class="material-icons" style="font-size:60px;color:#555">train</span><p style="color:#aaa;margin-top:12px">No train detection events found for this date.</p><p style="color:#777;margin-top:4px;font-size:.85rem">Select a highlighted date to view events.</p></div>';
    return;
  }
  const totalPages = Math.ceil(dayEvents.length / calEventsPerPage);
  const start = calEventsPage * calEventsPerPage;
  const pageEvents = dayEvents.slice(start, start + calEventsPerPage);
  const fmtDur = s => { if (s == null) return 'ongoing'; const m = Math.floor(s / 60), sec = s % 60; return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'); };

  el.innerHTML = '<table><tr style="background:#1f1f1f"><th style="background:#1f1f1f;color:#FFC107;font-weight:700">⏱ Timestamp</th><th style="background:#1f1f1f;color:#FFC107;font-weight:700">🚩 Reporting Marks</th><th style="background:#1f1f1f;color:#FFC107;font-weight:700">📍 Location</th><th style="background:#1f1f1f;color:#FFC107;font-weight:700">🚂 Units</th><th style="background:#1f1f1f;color:#FFC107;font-weight:700">⏳ Duration</th><th style="background:#1f1f1f;color:#FFC107;font-weight:700;text-align:right">Action</th></tr>' + pageEvents.map(e => {
    const t = new Date(e.start_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const marks = e.reporting_marks || [];
    return '<tr style="transition:.2s"><td style="color:#fff;font-weight:500">' + t + '</td><td>' + (marks[0] ? '<span style="color:#FFC107;font-weight:600">' + marks[0] + '</span>' + (marks.length > 1 ? ' <span class="chip primary">+' + (marks.length - 1) + '</span>' : '') : '—') + '</td><td style="color:#64B5F6;font-weight:600">' + (e.stream_name || '—') + '</td><td><span class="chip primary">' + (e.units_count || 0) + '</span></td><td><span class="chip success">' + fmtDur(e.duration_seconds) + '</span></td><td style="text-align:right"><button class="btn btn-warning btn-sm" onclick=""><span class="material-icons" style="font-size:.9rem">search</span> View Details</button></td></tr>';
  }).join('') + '</table>';
  // Pagination
  if (totalPages > 1) {
    el.innerHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-top:8px;color:#aaa;font-size:.85rem"><span>' + (start + 1) + '–' + Math.min(start + calEventsPerPage, dayEvents.length) + ' of ' + dayEvents.length + '</span><div style="display:flex;gap:4px"><select class="select" style="font-size:.8rem;padding:4px 8px" onchange="calEventsPerPage=parseInt(this.value);calEventsPage=0;renderCalendarEvents()">' + [5, 10, 25, 50].map(n => '<option value="' + n + '"' + (n === calEventsPerPage ? ' selected' : '') + '>' + n + '</option>').join('') + '</select><button class="btn btn-outline btn-sm" onclick="calEventsPage=Math.max(0,calEventsPage-1);renderCalendarEvents()" ' + (calEventsPage === 0 ? 'disabled' : '') + '>&lt;</button><button class="btn btn-outline btn-sm" onclick="calEventsPage=Math.min(' + (totalPages - 1) + ',calEventsPage+1);renderCalendarEvents()" ' + (calEventsPage >= totalPages - 1 ? 'disabled' : '') + '>&gt;</button></div></div>';
  }
}

/* ═══════════════ DASHBOARD ═══════════════ */
function loadDashboard() {
  const el = document.getElementById('dashboardTable');
  const chipsEl = document.getElementById('dashboardChips');
  const events = simRailwayEvents;
  chipsEl.innerHTML = '<span class="chip secondary" style="display:inline-flex;align-items:center;gap:4px"><span class="material-icons" style="font-size:1rem">train</span> ' + events.length + ' events</span>';
  if (!events.length) {
    el.innerHTML = '<p style="text-align:center;padding:40px;color:#aaa">There are no Railway Events available</p>';
    return;
  }
  const fmt = ts => { try { return new Date(ts).toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); } catch (_) { return '—'; } };
  const fmtDur = s => { if (s == null) return '—'; const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = Math.floor(s % 60); return h > 0 ? h + 'h ' + m + 'm ' + sec + 's' : m > 0 ? m + 'm ' + sec + 's' : sec + 's'; };
  el.innerHTML = '<table><tr><th><span style="display:flex;align-items:center;gap:4px"><span class="material-icons" style="font-size:1rem">schedule</span> Start</span></th><th><span style="display:flex;align-items:center;gap:4px"><span class="material-icons" style="font-size:1rem">schedule</span> End</span></th><th style="text-align:center"><span style="display:flex;align-items:center;gap:4px;justify-content:center"><span class="material-icons" style="font-size:1rem">access_time</span> Duration</span></th><th style="text-align:center"><span style="display:flex;align-items:center;gap:4px;justify-content:center"><span class="material-icons" style="font-size:1rem">train</span> Frames</span></th><th style="text-align:center">Units</th><th><span style="display:flex;align-items:center;gap:4px"><span class="material-icons" style="font-size:1rem">badge</span> Reporting Marks</span></th><th style="text-align:center"><span style="display:flex;align-items:center;gap:4px;justify-content:center"><span class="material-icons" style="font-size:1rem">image</span> Last Detection</span></th><th style="text-align:center">Video</th><th style="text-align:center">Action</th></tr>' + events.slice(0, 50).map(e => '<tr style="cursor:pointer;transition:.2s"><td>' + fmt(e.start_time) + '</td><td>' + (e.end_time ? fmt(e.end_time) : '— (active)') + '</td><td style="text-align:center;font-weight:700">' + fmtDur(e.duration_seconds) + '</td><td style="text-align:center">' + (e.frames_count || 0) + '</td><td style="text-align:center">' + (e.units_count || 0) + '</td><td>' + (e.reporting_marks || []).slice(0, 6).map(r => '<span class="chip primary" style="margin:1px">' + r + '</span>').join('') + ((e.reporting_marks || []).length > 6 ? '<span class="chip primary">+' + (e.reporting_marks.length - 6) + '</span>' : '') + '</td><td style="text-align:center"><div style="width:80px;height:50px;background:#1a1a1a;border-radius:4px;border:1px solid rgba(255,193,7,.2);display:flex;align-items:center;justify-content:center;margin:0 auto"><span class="material-icons" style="font-size:1.2rem;color:#555">image</span></div></td><td style="text-align:center"><button class="btn btn-outline btn-sm" title="View event video"><span class="material-icons" style="font-size:1rem">play_arrow</span></button></td><td style="text-align:center"><button class="btn btn-primary btn-sm"><span class="material-icons" style="font-size:.9rem">search</span> View Details</button></td></tr>').join('') + '</table>';
}

/* ═══════════════ FRAME GALLERY ═══════════════ */
function loadFrames() {
  const el = document.getElementById('frameGrid');
  const filter = document.getElementById('frameFilter').value;
  const frames = filter ? simFrames.filter(f => f.stream_id === filter) : simFrames;
  const total = frames.length;
  const perPage = 12;
  const start = (framesPage - 1) * perPage;
  const pageFrames = frames.slice(start, start + perPage);

  document.getElementById('framesCountText').textContent = total + ' saved frames';
  const processed = simFrames.length + Math.floor(simFrames.length * 1.5);
  const discarded = processed - total;
  document.getElementById('framesStats').innerHTML = '📊 Processed: ' + processed + ' | ✅ Saved: ' + total + ' | ❌ Discarded: ' + discarded + (processed > 0 ? ' | 📈 Tasa de guardado: ' + ((total / processed) * 100).toFixed(1) + '%' : '');

  if (!pageFrames.length) {
    el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px"><span class="material-icons" style="font-size:60px;color:#555">photo_camera</span><p style="color:#aaa;margin-top:12px">📷 No frames available</p><p style="color:#777;margin-top:4px;font-size:.85rem">' + (filter ? 'Try changing the location filter or' : '') + ' start a capture to see frames here</p></div>';
    document.getElementById('framesPagination').innerHTML = '';
    return;
  }

  el.innerHTML = pageFrames.map(f => {
    const date = new Date(f.timestamp).toLocaleString();
    const kb = f.size ? (f.size / 1024).toFixed(1) : '—';
    const hasTrain = f.has_trains || f.detection_count > 0;
    const dets = f.detections || [];
    const avgConf = dets.length ? (dets.reduce((a, d) => a + d.confidence, 0) / dets.length * 100).toFixed(1) : 0;
    // Use placeholder image
    return '<div class="card frame-card"><div style="width:100%;height:200px;background:linear-gradient(135deg,#1a1a1a,#2a2a0a);display:flex;align-items:center;justify-content:center;border-radius:15px 15px 0 0"><span class="material-icons" style="font-size:48px;color:' + (hasTrain ? '#FFC107' : '#555') + '">' + (hasTrain ? 'train' : 'photo_camera') + '</span></div><div class="frame-info"><p style="font-size:.75rem;color:#aaa;margin-bottom:4px">' + date + '</p><p style="font-size:.8rem;color:#aaa;margin-bottom:6px">' + kb + ' KB</p><span class="chip ' + (hasTrain ? 'success' : 'error') + '">' + (hasTrain ? (f.detection_count || 1) + ' Railcar' : 'No Railcars') + '</span>' + (hasTrain && f.total_serials ? '<span class="chip primary" style="margin-left:4px">' + f.total_serials + ' Marks</span>' : '') + (hasTrain && avgConf > 0 ? '<p style="font-size:.75rem;color:#aaa;margin-top:6px">Avg confidence: ' + avgConf + '%</p>' : '') + '</div></div>';
  }).join('');

  // Pagination
  const totalPages = Math.ceil(total / perPage);
  let pgHtml = '';
  for (let i = 1; i <= totalPages && i <= 10; i++) pgHtml += '<button class="' + (i === framesPage ? 'active' : '') + '" onclick="framesPage=' + i + ';loadFrames()">' + i + '</button>';
  document.getElementById('framesPagination').innerHTML = pgHtml;
}

function loadFrameFilters() {
  const sel = document.getElementById('frameFilter');
  SIM_STREAMS.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
}

/* ═══════════════ INIT ═══════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderStreams();
  loadFrameFilters();
});
</script>
</body>
